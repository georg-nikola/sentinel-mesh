---
# Sentinel Mesh Frontend IngressRoute
# Authentication: Authentik forwardAuth SSO
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentinel-mesh-frontend
  namespace: sentinel-mesh
spec:
  entryPoints:
    - web
    - websecure
  routes:
  - match: Host(`sentinel-mesh.example.com`)
    kind: Rule
    middlewares:
    - name: authentik-forwardauth
      namespace: authentik
    services:
    - name: frontend
      port: 80
  - match: Host(`sentinel-mesh.example.com`) && PathPrefix(`/outpost.goauthentik.io/`)
    kind: Rule
    priority: 15
    services:
    - name: authentik-server
      namespace: authentik
      port: 80
---
# Sentinel Mesh API IngressRoute
# Authentication: Authentik forwardAuth SSO
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentinel-mesh-api
  namespace: sentinel-mesh
spec:
  entryPoints:
    - web
    - websecure
  routes:
  - match: Host(`sentinel-mesh-api.example.com`)
    kind: Rule
    middlewares:
    - name: authentik-forwardauth
      namespace: authentik
    services:
    - name: api
      port: 8080
  - match: Host(`sentinel-mesh-api.example.com`) && PathPrefix(`/outpost.goauthentik.io/`)
    kind: Rule
    priority: 15
    services:
    - name: authentik-server
      namespace: authentik
      port: 80
